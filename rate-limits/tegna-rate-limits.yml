specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: TEGNA
providerId: tegna
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Broadcasting
  - Media
  - Television
  - Digital Advertising
  - OTT
  - CTV
  - Fortune 500
  - Rate Limiting
description: TEGNA does not publish a developer rate-limit specification. Programmatic deal IDs and
  any direct API integrations (AudienceOne, Premion) operate inside agency / DSP / SSP partnerships
  whose throttling is set on the partner platform side.
sources:
  - https://www.tegna.com/
  - https://www.premion.com/
notes: No public TEGNA developer documentation enumerating per-second / per-minute API limits could
  be located. Throttling for AudienceOne and Premion integrations is managed through the third-party
  ad-tech platforms TEGNA uses, not as a published TEGNA limit.
limits:
  - name: Partner-Defined Limits
    scope: account
    metric: varies
    limit: see partner ad-tech platform
    notes: Rate limits for programmatic and audience-data integrations are defined by the underlying
      ad-tech platforms (DSP / SSP / DMP) rather than published by TEGNA.
policies:
  - name: Partner Platform Governance
    description: Throttling and quota behavior follow the partner platform terms. TEGNA does not
      publish independent API rate-limit numbers for its advertising surface.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
