apis:
  - aid: tegna:audience-one-api
    name: TEGNA AudienceOne API
    description: >-
      TEGNA AudienceOne is a first-party data targeting platform enabling
      advertisers to reach audiences across TEGNA's 64 local television brands
      in 51 markets using privacy-first targeting. The platform provides
      programmatic access to audience segments, campaign management, and
      performance analytics for digital, display, native, and pre-roll video
      advertising. Supports geofencing, retargeting, and precision targeting
      without third-party cookies.
    humanURL: https://www.tegna.com/advertise/solutions/digital/
    baseURL: https://api.tegna.com
    tags:
      - Advertising
      - Audience Targeting
      - Digital Media
      - First-Party Data
      - Programmatic
    properties:
      - type: Documentation
        url: https://www.tegna.com/advertise/solutions/digital/
      - type: OpenAPI
        url: openapi/tegna-audience-one-openapi.yml
      - type: JSONSchema
        url: json-schema/tegna-campaign-schema.json
  - aid: tegna:premion-api
    name: TEGNA Premion OTT Advertising API
    description: >-
      Premion is TEGNA's over-the-top (OTT) and connected TV (CTV) advertising
      platform, enabling advertisers to reach audiences across premium streaming
      services including Roku, Hulu, Amazon Fire TV, and other OTT platforms.
      The Premion API provides campaign creation, audience targeting, impression
      delivery, and performance reporting for streaming video advertising at
      local and national scale.
    humanURL: https://premion.com/
    baseURL: https://api.premion.com
    tags:
      - OTT Advertising
      - CTV
      - Connected TV
      - Streaming
      - Video Advertising
    properties:
      - type: Documentation
        url: https://premion.com/
      - type: OpenAPI
        url: openapi/tegna-premion-openapi.yml
