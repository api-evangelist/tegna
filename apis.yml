aid: tegna
name: TEGNA
description: >-
  TEGNA Inc. is an American broadcast, digital media, and marketing services
  company headquartered in Tysons, Virginia, operating as a subsidiary of
  Nexstar Media Group following FCC approval of the $6.2 billion acquisition
  in March 2026. TEGNA operates 64 full-power broadcast television stations
  across 51 U.S. markets, reaching approximately 39 percent of all television
  households. TEGNA offers digital marketing solutions including AudienceOne
  first-party data targeting, OTT/CTV advertising through its Premion platform,
  and the TEGNA Marketing Solutions full-service agency. The company provides
  advertising APIs and programmatic integrations for digital, broadcast,
  streaming, and connected TV advertising campaigns.
type: Index
