specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: TEGNA
providerId: tegna
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Broadcasting
  - Media
  - Television
  - Digital Advertising
  - OTT
  - CTV
  - Fortune 500
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for TEGNA's advertising surface. TEGNA bills advertisers
  via insertion orders and programmatic deal settlements rather than as developer API consumption,
  so meters describe ad-impression delivery rather than API call cost.
sources:
  - https://www.tegna.com/
  - https://www.premion.com/
notes: TEGNA does not operate a developer-billed API product. There is no published consumption
  price list or usage-export surface to reconcile to FOCUS columns. The meters below describe the
  underlying media-buy lines (impressions, GRPs) rather than API requests.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: TEGNA Inc.
serviceCategory: Media / Advertising
billingModel:
  pricingCategory: Contract / Insertion Order
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: TEGNA Advertising
  ServiceCategory: Media / Advertising
  ProviderName: TEGNA
  PublisherName: TEGNA Inc.
  InvoiceIssuerName: TEGNA Inc.
  BillingCurrency: USD
meters:
  - name: ad_impressions
    unit: impression
    aggregation: sum
    dimensions:
      - station
      - daypart
      - audience
      - campaign
  - name: media_spend
    unit: USD
    aggregation: sum
    dimensions:
      - campaign
      - product_line
principles:
  - name: Visibility
    description: Campaign delivery and pacing are reported through TEGNA's ad-ops and Premion
      reporting; there is no public developer usage dashboard.
  - name: Allocation
    description: Spend is allocated by advertiser, agency, campaign, and product line (broadcast,
      Premion OTT/CTV, AudienceOne).
  - name: Optimization
    description: Optimization is editorial / media-mix (daypart, audience targeting, deal type)
      rather than API-cost driven.
  - name: Accountability
    description: The advertiser / agency is the accountable owner of the insertion order or
      programmatic deal.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
