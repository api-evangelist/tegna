description: TEGNA sells broadcast, OTT/CTV, and digital advertising inventory through TEGNA
  Marketing Solutions, Premion, and AudienceOne. There is no public self-service developer pricing
  for TEGNA's advertising APIs; campaigns are transacted through agency / direct-buy contracts and
  programmatic deal IDs negotiated with TEGNA's sales team.
sources:
  - https://www.tegna.com/
  - https://www.premion.com/
notes: TEGNA does not publish a public price list or developer plan ladder for its advertising APIs.
  Inventory is sold via insertion orders, programmatic guaranteed deals, and PMP deals; no
  self-serve free / pro / enterprise tier exists. The original scaffold tiers were not
  representative and have been removed.
