naftiko: 1.0.0-alpha2
info:
  label: TEGNA Premion OTT Advertising API — Creatives
  description: 'TEGNA Premion OTT Advertising API — Creatives. 2 operations. Lead operation: List Creatives. Self-contained
    Naftiko capability covering one Tegna business surface.'
  tags:
  - Tegna
  - Creatives
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TEGNA_API_KEY: TEGNA_API_KEY
capability:
  consumes:
  - type: http
    namespace: premion-creatives
    baseUri: https://api.premion.com/v1
    description: TEGNA Premion OTT Advertising API — Creatives business capability. Self-contained, no shared references.
    resources:
    - name: creatives
      path: /creatives
      operations:
      - name: listcreatives
        method: GET
        description: List Creatives
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: uploadcreative
        method: POST
        description: Upload Creative
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.TEGNA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: premion-creatives-rest
    port: 8080
    description: REST adapter for TEGNA Premion OTT Advertising API — Creatives. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/creatives
      name: creatives
      description: REST surface for creatives.
      operations:
      - method: GET
        name: listcreatives
        description: List Creatives
        call: premion-creatives.listcreatives
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: uploadcreative
        description: Upload Creative
        call: premion-creatives.uploadcreative
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: premion-creatives-mcp
    port: 9090
    transport: http
    description: MCP adapter for TEGNA Premion OTT Advertising API — Creatives. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-creatives
      description: List Creatives
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: premion-creatives.listcreatives
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-creative
      description: Upload Creative
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: premion-creatives.uploadcreative
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
