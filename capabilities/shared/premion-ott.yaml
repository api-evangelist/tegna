naftiko: "1.0.0-alpha1"

info:
  label: "TEGNA Premion OTT Advertising API"
  description: "OTT/CTV advertising platform for streaming video ads across Roku, Hulu, Amazon Fire TV, and other platforms."
  tags:
    - TEGNA
    - Premion
    - OTT Advertising
    - CTV
    - Connected TV
    - Streaming
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      PREMION_API_KEY: PREMION_API_KEY

capability:
  consumes:
    - type: http
      namespace: tegna-premion
      baseUri: https://api.premion.com/v1
      description: "Premion OTT/CTV advertising platform API."
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{PREMION_API_KEY}}"
        placement: header
      resources:
        - name: ott-campaigns
          path: /campaigns
          description: "OTT/CTV advertising campaigns."
          operations:
            - name: list-ott-campaigns
              method: GET
              description: "List OTT/CTV campaigns."
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-ott-campaign
              method: POST
              description: "Create a new OTT/CTV campaign."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  startDate: "{{tools.startDate}}"
                  budget: "{{tools.budget}}"
                  targetPlatforms: "{{tools.targetPlatforms}}"
                  impressionGoal: "{{tools.impressionGoal}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-ott-campaign
              method: GET
              description: "Get OTT campaign details."
              inputParameters:
                - name: campaignId
                  in: path
                  type: string
                  required: true
                  description: "Campaign ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-ott-campaign-performance
              method: GET
              description: "Get OTT campaign streaming performance."
              inputParameters:
                - name: campaignId
                  in: path
                  type: string
                  required: true
                  description: "Campaign ID."
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date for performance data."
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date for performance data."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: inventory
          path: /inventory
          description: "Available OTT/CTV advertising inventory."
          operations:
            - name: list-ott-inventory
              method: GET
              description: "List available OTT inventory across streaming platforms."
              inputParameters:
                - name: platform
                  in: query
                  type: string
                  required: false
                  description: "Filter by streaming platform."
                - name: genre
                  in: query
                  type: string
                  required: false
                  description: "Filter by content genre."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
        - name: creatives
          path: /creatives
          description: "Video creative assets for OTT advertising."
          operations:
            - name: list-creatives
              method: GET
              description: "List video creative assets."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: tegna-premion-rest
      resources:
        - path: /v1/ott-campaigns
          name: ott-campaigns
          operations:
            - method: GET
              name: list-ott-campaigns
              description: "List Premion OTT campaigns."
              call: "tegna-premion.list-ott-campaigns"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/inventory
          name: inventory
          operations:
            - method: GET
              name: list-ott-inventory
              description: "List available OTT inventory."
              call: "tegna-premion.list-ott-inventory"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: tegna-premion-mcp
      transport: http
      tools:
        - name: list-ott-campaigns
          description: "List Premion OTT/CTV advertising campaigns."
          hints:
            readOnly: true
          call: "tegna-premion.list-ott-campaigns"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-ott-campaign-performance
          description: "Get streaming video performance metrics for a Premion OTT campaign."
          hints:
            readOnly: true
          call: "tegna-premion.get-ott-campaign-performance"
          with:
            campaignId: "tools.campaignId"
            startDate: "tools.startDate"
            endDate: "tools.endDate"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-ott-inventory
          description: "Browse available OTT/CTV ad inventory across Roku, Hulu, Fire TV, and other platforms."
          hints:
            readOnly: true
          call: "tegna-premion.list-ott-inventory"
          with:
            platform: "tools.platform"
            genre: "tools.genre"
          outputParameters:
            - type: array
              mapping: "$."
