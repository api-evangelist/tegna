naftiko: "1.0.0-alpha1"

info:
  label: "TEGNA AudienceOne API"
  description: "First-party data targeting platform for digital advertising across TEGNA's 64 local TV brands."
  tags:
    - TEGNA
    - Advertising
    - Audience Targeting
    - Digital Media
    - Programmatic
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TEGNA_API_TOKEN: TEGNA_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: tegna-audience-one
      baseUri: https://api.tegna.com/v1
      description: "TEGNA AudienceOne digital advertising API."
      authentication:
        type: bearer
        token: "{{TEGNA_API_TOKEN}}"
      resources:
        - name: audiences
          path: /audiences
          description: "TEGNA first-party audience segments."
          operations:
            - name: list-audiences
              method: GET
              description: "List available audience segments for targeting."
              inputParameters:
                - name: market
                  in: query
                  type: string
                  required: false
                  description: "Filter by TEGNA market."
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Audience type filter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-audience
              method: GET
              description: "Get details for a specific audience segment."
              inputParameters:
                - name: audienceId
                  in: path
                  type: string
                  required: true
                  description: "Audience segment ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: campaigns
          path: /campaigns
          description: "TEGNA advertising campaigns."
          operations:
            - name: list-campaigns
              method: GET
              description: "List advertising campaigns."
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by campaign status."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-campaign
              method: POST
              description: "Create a new digital advertising campaign."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  startDate: "{{tools.startDate}}"
                  budget: "{{tools.budget}}"
                  targetAudiences: "{{tools.targetAudiences}}"
                  targetMarkets: "{{tools.targetMarkets}}"
                  adFormats: "{{tools.adFormats}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-campaign
              method: GET
              description: "Get details for a specific campaign."
              inputParameters:
                - name: campaignId
                  in: path
                  type: string
                  required: true
                  description: "Campaign ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-campaign-performance
              method: GET
              description: "Get performance metrics for a campaign."
              inputParameters:
                - name: campaignId
                  in: path
                  type: string
                  required: true
                  description: "Campaign ID."
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date for performance data."
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date for performance data."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: markets
          path: /markets
          description: "TEGNA broadcast markets."
          operations:
            - name: list-markets
              method: GET
              description: "List available TEGNA broadcast markets."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: tegna-audience-one-rest
      resources:
        - path: /v1/audiences
          name: audiences
          operations:
            - method: GET
              name: list-audiences
              description: "List TEGNA audience segments."
              call: "tegna-audience-one.list-audiences"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/campaigns
          name: campaigns
          operations:
            - method: GET
              name: list-campaigns
              description: "List TEGNA ad campaigns."
              call: "tegna-audience-one.list-campaigns"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: tegna-audience-one-mcp
      transport: http
      tools:
        - name: list-audiences
          description: "List TEGNA AudienceOne first-party audience segments."
          hints:
            readOnly: true
          call: "tegna-audience-one.list-audiences"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-campaigns
          description: "List TEGNA digital advertising campaigns."
          hints:
            readOnly: true
          call: "tegna-audience-one.list-campaigns"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-campaign-performance
          description: "Get performance metrics for a TEGNA advertising campaign."
          hints:
            readOnly: true
          call: "tegna-audience-one.get-campaign-performance"
          with:
            campaignId: "tools.campaignId"
            startDate: "tools.startDate"
            endDate: "tools.endDate"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-markets
          description: "List TEGNA broadcast markets available for targeting."
          hints:
            readOnly: true
          call: "tegna-audience-one.list-markets"
          outputParameters:
            - type: array
              mapping: "$."
